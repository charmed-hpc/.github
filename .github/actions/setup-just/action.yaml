name: Setup just
description: Install a pinned version of just

inputs:
  just-version:
    description: Override the pinned just version
    required: false
    default: "1.48.1"

runs:
  using: composite
  steps:
    - uses: extractions/setup-just@v4
      with:
        just-version: ${{ inputs.just-version }}

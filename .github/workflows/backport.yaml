name: Backport
on:
  workflow_call:
    inputs:
      branches:
        description: "JSON array of branch names to backport merged commits to"
        type: string
        required: true

jobs:
  backport:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJSON(inputs.branches) }}
    # Only react to merged PRs for security reasons.
    # See https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request_target.
    if: >
      github.event.pull_request.merged
      && (
          github.event.action == 'closed'
          && contains(github.event.pull_request.labels.*.name, 'backport')
        || (
          github.event.action == 'labeled'
          && contains(github.event.label.name, 'backport')
        )
      )
    steps:
      - name: Backport to branch ${{ matrix.target }}
        uses: kiegroup/git-backporting@95dbe6abbfa9f63036ff7ab3ebd1ad2600c74f5b # main
        with:
          target-branch: ${{ matrix.target }}
          pull-request: ${{ github.event.pull_request.url }}
          auth: ${{ secrets.GITHUB_TOKEN }}
          enable-err-notification: true
          auto-no-squash: true
